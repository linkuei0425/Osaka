        'osaka-himeji': '建議搭乘 JR神戶線新快速直達 (約65分) 或 新幹線 (約30分)',
        'himeji-osaka': '建議搭乘 JR神戶線新快速直達 (約65分) 或 新幹線 (約30分)',
        'kyoto-nara': '建議搭乘 近鐵京都線特急/急行 (約35-45分) 或 JR奈良線 (約45分)',
        'nara-kyoto': '建議搭乘 近鐵京都線特急/急行 (約35-45分) 或 JR奈良線 (約45分)',
        'kyoto-uji': '建議搭乘 JR奈良線 (約20分) 或 京阪本線轉宇治線 (約30分)',
        'uji-kyoto': '建議搭乘 JR奈良線 (約20分) 或 京阪宇治線轉本線 (約30分)',
        'kobe-himeji': '建議搭乘 JR神戶線新快速 (約40分)',
        'himeji-kobe': '建議搭乘 JR神戶線新快速 (約40分)',
        'kobe-nara': '建議搭乘 阪神本線直通近鐵奈良線快速急行 (約90分)',
        'nara-kobe': '建議搭乘 近鐵奈良線直通阪神本線快速急行 (約90分)',
        'kyoto-kobe': '建議搭乘 JR京都/神戶線新快速直達 (約55分) 或 阪急本線轉乘 (約70分)',
        'kobe-kyoto': '建議搭乘 JR神戶/京都線新快速直達 (約55分) 或 阪急本線轉乘 (約70分)'
      };

      return routes[route] || '建議搭乘 JR 或 地區私鐵 進行跨城移動 (約60-90分)';
    };

    // --- 輔助函數：時間與顏色 ---
    const formatTime = (timeInHours) => {
      let h = Math.floor(timeInHours);
      let m = Math.round((timeInHours - h) * 60);
      if (m === 60) {
        h += 1;
        m = 0;
      }
      h = h % 24;
      return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const city = CITIES.find(c => c.id === cityId);
      if (cityId === 'osaka') return 'text-blue-600 bg-blue-100 border-blue-200';
      if (cityId === 'kyoto') return 'text-emerald-600 bg-emerald-100 border-emerald-200';
      if (cityId === 'nara') return 'text-amber-600 bg-amber-100 border-amber-200';
      if (cityId === 'uji') return 'text-teal-600 bg-teal-100 border-teal-200';
      if (cityId === 'kobe') return 'text-indigo-600 bg-indigo-100 border-indigo-200';
      if (cityId === 'himeji') return 'text-rose-600 bg-rose-100 border-rose-200';
      return 'text-slate-600 bg-slate-100 border-slate-200';
    };

    // --- 主程式 ---
    function App() {
      const [activeCity, setActiveCity] = useState('osaka');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);

      const toggleAttraction = (id) => {
        setSelectedIds(prev => 
          prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
        );
      };

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];

        const selected = selectedIds
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .sort((a, b) => a.region - b.region);

        const DAY_LIMIT = 12; 
        let days = [];
        let currentDay = { items: [], totalTime: 0 };
        let lastRegion = null;
        let lastCity = null;

        selected.forEach(attr => {
          let travelTime = 0;
          const isFirstOfDay = currentDay.items.length === 0;
          let fromCity = isFirstOfDay ? 'osaka' : lastCity;
          let toCity = attr.city;

          if (isFirstOfDay) {
            travelTime = attr.city === 'osaka' ? 0.5 : 1.5;
          } else {
            if (lastCity !== attr.city) {
              travelTime = 1.5; 
            } else if (lastRegion !== attr.region) {
              travelTime = 0.8; 
            } else {
              travelTime = 0.3; 
            }
          }

          let requiredTime = attr.stay + travelTime;

          if (requiredTime >= DAY_LIMIT) {
            if (currentDay.items.length > 0) {
              days.push(currentDay);
              currentDay = { items: [], totalTime: 0 };
              travelTime = attr.city === 'osaka' ? 0.5 : 1.5;
              requiredTime = attr.stay + travelTime;
              fromCity = 'osaka'; 
            }
            days.push({ items: [{ ...attr, travelTime, fromCity, toCity }], totalTime: requiredTime });
            lastRegion = null;
            lastCity = null;
            return;
          }

          if (currentDay.totalTime + requiredTime > DAY_LIMIT && !isFirstOfDay) {
            days.push(currentDay);
            currentDay = { items: [], totalTime: 0 };
            
            travelTime = attr.city === 'osaka' ? 0.5 : 1.5; 
            requiredTime = attr.stay + travelTime;
            fromCity = 'osaka'; 
          }

          currentDay.items.push({ ...attr, travelTime, fromCity, toCity });
          currentDay.totalTime += requiredTime;
          lastRegion = attr.region;
          lastCity = attr.city;
        });

        if (currentDay.items.length > 0) {
          days.push(currentDay);
        }

        return days.map((day, index) => {
          let currentTime = 9.0;
          const scheduledItems = day.items.map(item => {
            let travelStr = null;
            if (item.travelTime > 0) {
              const tStart = currentTime;
              currentTime += item.travelTime;
              travelStr = `${formatTime(tStart)} - ${formatTime(currentTime)}`;
            }
            const sStart = currentTime;
            currentTime += item.stay;
            const stayStr = `${formatTime(sStart)} - ${formatTime(currentTime)}`;
            
            return {
              ...item,
              timeStr: stayStr,
              travelStr: travelStr
            };
          });

          return {
            dayNum: index + 1,
            items: scheduledItems,
            totalHours: Number(day.totalTime.toFixed(1)),
            endTime: currentTime
          };
        });
      }, [selectedIds]);

      // ==========================================
      // 列印模式 UI
      // ==========================================
      if (showPrintView) {
        return (
          <div className="min-h-screen bg-slate-100 text-slate-800 p-4 md:p-8 font-sans print:bg-white print:p-0">
            <div className="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200 print:shadow-none print:border-none">
              
              <div className="bg-slate-800 text-white p-8 text-center print:bg-white print:text-slate-900 print:p-4 print:border-b-2 print:border-slate-800">
                <h1 className="text-3xl font-bold mb-2">✈️ 專屬關西自由行 行程表</h1>
                <p className="text-slate-300 print:text-slate-600">為您精心規劃的 {itineraryDays.length} 天旅程，預祝旅途愉快！</p>
              </div>

              <div className="p-8 print:p-4">
                {itineraryDays.map(day => (
                  <div key={day.dayNum} className="mb-12 last:mb-0 print-break-avoid">
                    <div className="flex items-center justify-between border-b-2 border-slate-200 pb-3 mb-6">
                      <h2 className="text-2xl font-bold text-slate-800">🌞 第 {day.dayNum} 天</h2>
                      <span className="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                        總計: {day.totalHours} 小時
                      </span>
                    </div>
                    
                    <div className="relative border-l-2 border-slate-200 ml-5 pl-8 space-y-8">
                      <div className="relative">
                        <div className="absolute -left-[45px] top-0 bg-slate-200 text-slate-600 w-7 h-7 rounded-full border-[3px] border-white flex items-center justify-center text-xs font-bold shadow-sm">出發</div>
                        <div className="font-bold text-slate-500 text-sm">09:00</div>
                        <div className="text-slate-800 font-bold">從大阪的飯店出發</div>
                      </div>

                      {day.items.map((item, idx) => {
                        const isCrossCity = item.fromCity !== item.toCity;
                        const travelText = isCrossCity
                          ? `🚄 跨城移動：${getCrossCityTransportDetail(item.fromCity, item.toCity)}`
                          : `🚇 市區/同城移動約 ${Math.round(item.travelTime * 60)} 分`;
                          
                        return (
                          <React.Fragment key={item.id}>
                            {item.travelStr && (
                              <div className="relative">
                                <div className={`absolute -left-[38px] top-1 bg-white w-3 h-3 rounded-full border-[3px] ${isCrossCity ? 'border-red-300' : 'border-slate-300'}`}></div>
                                <div className={`text-sm inline-block font-bold ${isCrossCity ? 'text-red-600 bg-red-50 border-red-200' : 'text-slate-600 bg-slate-50 border-slate-200'} border px-3 py-1.5 rounded-lg shadow-sm`}>
                                  {item.travelStr} · {travelText}
                                </div>
                              </div>
                            )}

                            <div className="relative bg-white border-2 border-slate-100 p-5 rounded-xl shadow-sm">
                              <div className="absolute -left-[54px] top-5 bg-slate-800 text-white w-10 h-10 rounded-full border-4 border-white flex items-center justify-center text-sm font-bold shadow">
                                <i className="fa-solid fa-location-dot"></i>
                              </div>
                              <div className="text-slate-500 font-bold mb-1">{item.timeStr}</div>
                              <h4 className="font-bold text-xl text-slate-900 mb-2">{item.name}</h4>
                              <div className="flex flex-wrap gap-2 mb-3">
                                <span className="text-xs bg-blue-50 text-blue-700 border border-blue-100 px-2 py-1 rounded font-bold">停留 {item.stay}h</span>
                                <span className="text-xs bg-slate-100 text-slate-700 border border-slate-200 px-2 py-1 rounded font-bold">{item.regionName}</span>
                              </div>
                              <div className="text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100 leading-relaxed">
                                <strong className="text-blue-600"><i className="fa-solid fa-lightbulb"></i> 自由行到達方式：</strong>{item.transport}
                              </div>
                            </div>
                          </React.Fragment>
                        );
                      })}

                      <div className="relative">
                        <div className="absolute -left-[45px] top-0 bg-slate-200 text-slate-600 w-7 h-7 rounded-full border-[3px] border-white flex items-center justify-center text-xs font-bold shadow-sm">結束</div>
                        <div className="font-bold text-slate-500 text-sm">{formatTime(day.endTime)}</div>
                        <div className="text-slate-800 font-bold">行程結束 / 晚餐自由活動</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="bg-slate-50 p-6 text-center border-t border-slate-200 print-hidden flex justify-center gap-4">
                <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all flex items-center gap-2">
                  <i className="fa-solid fa-print"></i> 列印 / 儲存為 PDF
                </button>
                <button onClick={() => setShowPrintView(false)} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-xl font-bold shadow transition-all">
                  返回編輯行程
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 主畫面編輯器 UI
      // ==========================================
      const filteredAttractions = ATTRACTIONS.filter(a => a.city === activeCity);
      const groupedAttractions = filteredAttractions.reduce((acc, curr) => {
        if (!acc[curr.type]) acc[curr.type] = [];
        acc[curr.type].push(curr);
        return acc;
      }, {});

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10">
          <header className="bg-white shadow-sm sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2">
                  <i className="fa-solid fa-map-location-dot text-blue-600 text-2xl"></i>
                  <h1 className="text-xl font-bold text-slate-900">關西自由行 行程魔法師</h1>
                </div>
                <a 
                  href="https://linkuei0425.github.io/Osaka/index.html" 
                  className="flex items-center gap-1.5 text-sm font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full transition-colors border border-slate-200 hover:border-blue-200"
                  title="回到首頁"
                >
                  <i className="fa-solid fa-house"></i>
                  <span>首頁</span>
                </a>
              </div>
              <div className="text-sm font-medium bg-slate-800 text-white px-4 py-1.5 rounded-full shadow-sm">
                已選 {selectedIds.length} 個景點
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <div className="flex flex-col lg:flex-row gap-8">
              
              {/* 左側：景點選擇 */}
              <div className="lg:w-1/2 flex flex-col gap-5">
                <div className="bg-white rounded-xl shadow-sm p-2 flex gap-2 overflow-x-auto border border-slate-200 custom-scrollbar">
                  {CITIES.map(city => (
                    <button
                      key={city.id}
                      onClick={() => setActiveCity(city.id)}
                      className={`flex-1 min-w-[80px] py-2.5 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 ${
                        activeCity === city.id 
                          ? 'bg-slate-800 text-white shadow-md transform scale-[1.02]' 
                          : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                      }`}
                    >
                      {city.name}
                      {selectedIds.filter(id => ATTRACTIONS.find(a => a.id === id)?.city === city.id).length > 0 && (
                        <span className="bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">
                          {selectedIds.filter(id => ATTRACTIONS.find(a => a.id === id)?.city === city.id).length}
                        </span>
                      )}
                    </button>
                  ))}
                </div>

                <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                  <h2 className="text-base font-semibold flex items-center gap-2 mb-1">
                    <i className="fa-solid fa-check text-green-500"></i>
                    正在挑選：{CITIES.find(c => c.id === activeCity)?.name} 景點
                  </h2>
                  <p className="text-xs text-slate-500">
                    點擊卡片選擇景點。切換上方標籤可跨城市挑選，系統會自動幫您規劃包含「跨城市交通」的順暢路線。
                  </p>
                </div>

                <div className="space-y-6 max-h-[65vh] overflow-y-auto pr-2 custom-scrollbar">
                  {Object.entries(groupedAttractions).map(([type, items]) => (
                    <div key={type}>
                      <div className="flex items-center gap-2 mb-3 sticky top-0 bg-slate-50/90 backdrop-blur py-2 z-10">
                        <span className="bg-slate-400 w-1.5 h-1.5 rounded-full"></span>
                        <h3 className="font-bold text-slate-700">{type}</h3>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {items.map(attr => {
                          const isSelected = selectedIds.includes(attr.id);
                          return (
                            <div 
                              key={attr.id}
                              onClick={() => toggleAttraction(attr.id)}
                              className={`relative p-4 rounded-xl cursor-pointer transition-all duration-200 border-2 ${
                                isSelected 
                                  ? 'bg-blue-50 border-blue-500 shadow-md transform scale-[1.02]' 
                                  : 'bg-white border-transparent shadow-sm hover:border-slate-300'
                              }`}
                            >
                              <div className={`absolute top-3 right-3 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${
                                isSelected ? 'bg-blue-500 border-blue-500' : 'border-slate-300'
                              }`}>
                                {isSelected && <i className="fa-solid fa-check text-white text-xs"></i>}
                              </div>

                              <div className="pr-6">
                                <h4 className="font-bold text-slate-900 leading-tight mb-2">{attr.name}</h4>
                                <div className="flex flex-wrap items-center gap-2 text-xs font-medium mb-2">
                                  <span className="flex items-center gap-1 bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">
                                    <i className="fa-regular fa-clock"></i> {attr.stay}h
                                  </span>
                                  <span className={`flex items-center gap-1 px-1.5 py-0.5 rounded border ${getCityColor(attr.city)}`}>
                                    <i className="fa-solid fa-location-dot"></i> {attr.regionName}
                                  </span>
                                </div>
                                {attr.tag && (
                                  <span className={`inline-block text-[10px] px-2 py-0.5 rounded-full mb-2 font-bold ${
                                    attr.tag.includes('春') ? 'bg-pink-100 text-pink-700' : 
                                    attr.tag.includes('秋') ? 'bg-orange-100 text-orange-700' : 
                                    'bg-purple-100 text-purple-700'
                                  }`}>
                                    {attr.tag}
                                  </span>
                                )}
                                <p className="text-xs text-slate-500 line-clamp-2 mb-1.5">{attr.desc}</p>
                                <div className="text-[10px] text-slate-500 bg-slate-50 p-1.5 rounded border border-slate-100">
                                  <span className="font-bold text-blue-600">自由行到達方式：</span>{attr.transport}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 右側：自動生成的行程表 */}
              <div className="lg:w-1/2">
                <div className="sticky top-24 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden flex flex-col max-h-[85vh]">
                  
                  <div className="bg-slate-800 text-white p-5">
                    <div className="mb-4">
                      <h2 className="text-xl font-bold flex items-center gap-2">
                        <i className="fa-regular fa-calendar-check text-blue-400 text-2xl"></i>
                        專屬關西行程表
                      </h2>
                      <p className="text-slate-300 text-sm mt-1">
                        自動合併跨城景點，每日最多 12 小時
                      </p>
                    </div>
                    
                    <button
                      onClick={() => setShowPrintView(true)}
                      disabled={itineraryDays.length === 0}
                      className={`w-full flex items-center justify-center gap-2 text-sm font-bold py-3.5 px-4 rounded-xl shadow transition-all ${
                        itineraryDays.length > 0 
                          ? 'bg-blue-500 hover:bg-blue-600 text-white transform hover:scale-[1.02] cursor-pointer' 
                          : 'bg-slate-700 text-slate-400 cursor-not-allowed border border-slate-600'
                      }`}
                      title="開啟滿版輸出畫面"
                    >
                      <i className="fa-solid fa-arrow-up-right-from-square text-lg"></i>
                      確認並輸出 (景點可跨區域選完後再按確認)
                    </button>
                  </div>

                  <div className="p-5 overflow-y-auto flex-1 bg-slate-50 custom-scrollbar">
                    {itineraryDays.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-slate-400 py-12">
                        <i className="fa-solid fa-camera text-6xl mb-4 opacity-20"></i>
                        <p>尚未選擇任何景點</p>
                        <p className="text-sm mt-2">請從左側分頁挑選想去的城市與景點</p>
                      </div>
                    ) : (
                      <div className="space-y-8">
                        {itineraryDays.map((day) => (
                          <div key={day.dayNum} className="relative">
                            <div className="flex items-center justify-between mb-4 border-b border-slate-200 pb-2">
                              <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-sun text-orange-500"></i> 第 {day.dayNum} 天
                              </h3>
                              <span className="text-sm font-medium text-slate-500 bg-white px-2 py-1 rounded-md shadow-sm border border-slate-100">
                                總計: {day.totalHours} 小時
                              </span>
                            </div>

                            <div className="space-y-0 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                              
                              <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active mb-4">
                                <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-slate-200 text-slate-500 shadow-sm shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                  <span className="text-[10px] font-bold">09:00</span>
                                </div>
                                <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] text-xs font-bold text-slate-400 pl-4 md:pl-0 md:text-right md:group-odd:pr-4 md:group-even:pl-4">
                                  從大阪的飯店出發
                                </div>
                              </div>

                              {day.items.map((item, idx) => {
                                const isCrossCity = item.fromCity !== item.toCity;

                                return (
                                  <React.Fragment key={`${day.dayNum}-${item.id}`}>
                                    {item.travelStr && (
                                      <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group mb-4">
                                        <div className={`flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 border-2 shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 ${isCrossCity ? 'border-red-300 text-red-500' : 'border-slate-200 text-slate-400'}`}>
                                          <i className="fa-solid fa-train"></i>
                                        </div>
                                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] pl-4 md:pl-0 md:text-right md:group-odd:pr-4 md:group-even:pl-4">
                                          <div className={`text-xs bg-white border shadow-sm rounded-lg p-2 inline-block ${isCrossCity ? 'border-red-200' : 'border-slate-100 text-slate-500'}`}>
                                            <div className={`font-semibold ${isCrossCity ? 'text-red-600' : 'text-slate-700'}`}>{item.travelStr}</div>
                                            <div className={isCrossCity ? 'text-red-500 font-medium' : ''}>
                                              {isCrossCity 
                                                ? `🚄 跨城移動：${getCrossCityTransportDetail(item.fromCity, item.toCity)}`
                                                : `🚇 市區/同城移動約 ${Math.round(item.travelTime * 60)} 分`
                                              }
                                            </div>
                                          </div>
                                        </div>
                                      </div>
                                    )}

                                    <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group mb-4">
                                      <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 ${
                                        item.stay >= 8 ? 'bg-purple-600' : 'bg-slate-800'
                                      } text-white`}>
                                        <i className="fa-solid fa-location-dot"></i>
                                      </div>
                                      <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl bg-white shadow-md border border-slate-100 md:group-odd:text-right">
                                        <div className="text-slate-500 font-bold text-sm mb-1">{item.timeStr}</div>
                                        <h4 className="font-bold text-slate-900 text-base mb-1">{item.name}</h4>
                                        <div className="flex flex-wrap gap-2 mb-2 md:group-odd:justify-end">
                                          <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-medium text-slate-600">停留 {item.stay}h</span>
                                          <span className={`text-[10px] px-2 py-0.5 rounded font-bold border ${getCityColor(item.city)}`}>
                                            {CITIES.find(c => c.id === item.city)?.name} · {item.regionName}
                                          </span>
                                        </div>
                                        <div className="text-xs text-slate-500 flex items-start gap-1 md:group-odd:justify-end">
                                          <i className="fa-solid fa-circle-info shrink-0 mt-0.5"></i>
                                          <span className="text-left"><strong className="text-blue-600">自由行到達方式：</strong>{item.transport}</span>
                                        </div>
                                      </div>
                                    </div>
                                  </React.Fragment>
                                );
                              })}
                              
                              <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-slate-200 text-slate-500 shadow-sm shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                                  <span className="text-[10px] font-bold">{formatTime(day.endTime)}</span>
                                </div>
                                <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] text-xs font-bold text-slate-400 pl-4 md:pl-0 md:text-right md:group-odd:pr-4 md:group-even:pl-4">
                                  行程結束 / 晚餐自由活動
                                </div>
                              </div>

                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  
                  {itineraryDays.length > 0 && (
                    <div className="bg-slate-100 p-3 text-xs text-slate-600 flex items-start gap-2 border-t border-slate-200">
                      <i className="fa-solid fa-circle-exclamation shrink-0 mt-0.5 text-slate-500"></i>
                      <p>
                        提示：行程預設每天從<strong>「大阪市區的飯店」</strong>出發。若當日第一站位於外縣市，系統會自動加入跨城搭車路線與時間建議。
                      </p>
                    </div>
                  )}
                </div>
              </div>
              
            </div>
          </main>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
